<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>Horse - Animation Fix</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f5f7;
      overflow: hidden;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px;
      border-radius: 30px;
      display: flex;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 100;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: #f0f0f0;
    }

    button.active {
      background: orange;
      color: white;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    #debug {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 15px;
      border-radius: 5px;
      font-family: monospace;
      z-index: 1000;
      max-width: 400px;
    }

    .success { color: lightgreen; }
    .error { color: red; }
    .warning { color: orange; }
  </style>
</head>

<body>

<div id="debug">
  <div>📊 <strong>Отладка анимаций:</strong></div>
  <div>Статус модели: <span id="modelStatus">Загрузка...</span></div>
  <div>Всего анимаций: <span id="animCount">0</span></div>
  <div id="animList"></div>
  <div>Текущая анимация: <span id="currentAnim">-</span></div>
  <div id="warnings"></div>
</div>

<div id="controls">
  <button id="btn1">🎬 Анимация 1</button>
  <button id="btn2">🚶 Анимация 2</button>
  <button id="outlineBtn">✨ Контур</button>
  <button id="pixelBtn">🔳 Пиксели</button>
</div>

<model-viewer
  id="mv"
  src="horse.glb"
  camera-controls
  autoplay
  shadow-intensity="1"
  loading="eager"
  reveal="auto"
  animation-crossfade-duration="200"
>

  <effect-composer>
    <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
    <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
  </effect-composer>

</model-viewer>

<script type="module">
import 'https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js';

(() => {
  const mv = document.getElementById('mv');
  const btn1 = document.getElementById('btn1');
  const btn2 = document.getElementById('btn2');
  const outlineBtn = document.getElementById('outlineBtn');
  const pixelBtn = document.getElementById('pixelBtn');
  
  // Элементы отладки
  const modelStatus = document.getElementById('modelStatus');
  const animCount = document.getElementById('animCount');
  const animList = document.getElementById('animList');
  const currentAnimSpan = document.getElementById('currentAnim');
  const warningsDiv = document.getElementById('warnings');

  const outlineEffect = document.getElementById('outlineEffect');
  const pixelEffect = document.getElementById('pixelEffect');

  let animations = [];
  let outlineOn = false;
  let pixelOn = false;

  // Функция обновления отладочной информации
  function updateDebugInfo() {
    if (animations.length > 0) {
      animList.innerHTML = '📋 Список анимаций:<br>' + 
        animations.map((anim, i) => `  ${i}: ${anim}`).join('<br>');
      animCount.textContent = animations.length;
      animCount.className = 'success';
      
      // Автоматически запускаем первую анимацию если есть
      if (mv.animationName) {
        currentAnimSpan.textContent = mv.animationName;
      } else if (animations.length > 0) {
        setTimeout(() => playAnimation(0), 500);
      }
    }
  }

  // Загрузка модели
  mv.addEventListener('load', () => {
    modelStatus.innerHTML = '✅ Загружено';
    modelStatus.className = 'success';
    
    // Получаем анимации
    animations = mv.availableAnimations || [];
    console.log('Доступные анимации:', animations);
    
    if (animations.length === 0) {
      warningsDiv.innerHTML = '⚠️ <span class="warning">В модели нет анимаций!</span>';
      
      // Пробуем получить анимации другим способом
      setTimeout(() => {
        // Проверяем через внутренние свойства
        if (mv.model && mv.model.animations) {
          animations = mv.model.animations;
          console.log('Анимации из model:', animations);
        }
      }, 1000);
    }
    
    updateDebugInfo();
  });

  // Функция воспроизведения анимации
  function playAnimation(index) {
    if (!animations || animations.length === 0) {
      console.warn('Нет доступных анимаций');
      warningsDiv.innerHTML = '⚠️ <span class="warning">Нет анимаций для воспроизведения</span>';
      return;
    }
    
    if (index >= animations.length) {
      console.warn(`Анимация ${index} не существует. Доступно: ${animations.length}`);
      return;
    }
    
    const animName = animations[index];
    
    try {
      // Останавливаем текущую анимацию
      mv.pause?.();
      
      // Устанавливаем новую
      mv.animationName = animName;
      mv.currentTime = 0;
      
      // Воспроизводим
      mv.play?.();
      
      console.log('▶️ Играет:', animName);
      currentAnimSpan.textContent = animName;
      currentAnimSpan.className = 'success';
      
      // Подсвечиваем активную кнопку
      [btn1, btn2].forEach(btn => btn.classList.remove('active'));
      if (index === 0) btn1.classList.add('active');
      if (index === 1) btn2.classList.add('active');
      
    } catch (e) {
      console.error('Ошибка при воспроизведении анимации:', e);
      warningsDiv.innerHTML = `❌ <span class="error">Ошибка: ${e.message}</span>`;
    }
  }

  // Обработка ошибок модели
  mv.addEventListener('error', (event) => {
    modelStatus.innerHTML = '❌ Ошибка';
    modelStatus.className = 'error';
    console.error('Ошибка model-viewer:', event.detail);
  });

  // Альтернативный способ получения анимаций через MutationObserver
  const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
      if (mutation.type === 'attributes' && mutation.attributeName === 'animation-name') {
        console.log('Анимация изменена на:', mv.animationName);
      }
    });
  });
  
  observer.observe(mv, { attributes: true });

  // Кнопки анимаций
  btn1.onclick = () => playAnimation(0);
  btn2.onclick = () => playAnimation(1);

  // Эффекты
  outlineBtn.onclick = () => {
    if (outlineEffect) {
      outlineOn = !outlineOn;
      outlineEffect.setAttribute('blend-mode', outlineOn ? 'default' : 'skip');
      outlineBtn.classList.toggle('active');
    }
  };

  pixelBtn.onclick = () => {
    if (pixelEffect) {
      pixelOn = !pixelOn;
      pixelEffect.setAttribute('blend-mode', pixelOn ? 'default' : 'skip');
      pixelBtn.classList.toggle('active');
    }
  };

  // Периодическая проверка состояния анимации
  setInterval(() => {
    if (mv.animationName) {
      console.log('Текущая анимация:', mv.animationName, 'Время:', mv.currentTime);
    }
  }, 2000);

})();
</script>

</body>
</html>
