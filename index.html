<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>Horse</title>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f5f7;
      overflow: hidden;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px;
      border-radius: 30px;
      display: flex;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 100;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
    }

    button.active {
      background: orange;
      color: white;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    #debug {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      z-index: 1000;
      max-width: 300px;
    }
  </style>
</head>

<body>

<div id="debug">
  <div>Статус: <span id="status">Загрузка...</span></div>
  <div>Модель: <span id="modelPath">horse.glb</span></div>
  <div id="error"></div>
</div>

<div id="controls">
  <button id="btn1">🎬 Анимация 1</button>
  <button id="btn2">🚶 Анимация 2</button>
  <button id="outlineBtn">✨ Контур</button>
  <button id="pixelBtn">🔳 Пиксели</button>
</div>

<model-viewer
  id="mv"
  src="horse.glb"
  camera-controls
  autoplay
  shadow-intensity="1"
  loading="eager"
  reveal="auto"
>

  <effect-composer>
    <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
    <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
  </effect-composer>

</model-viewer>

<script type="module">
import 'https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js';

(() => {
  const mv = document.getElementById('mv');
  const btn1 = document.getElementById('btn1');
  const btn2 = document.getElementById('btn2');
  const outlineBtn = document.getElementById('outlineBtn');
  const pixelBtn = document.getElementById('pixelBtn');
  const statusSpan = document.getElementById('status');
  const errorDiv = document.getElementById('error');

  const outlineEffect = document.getElementById('outlineEffect');
  const pixelEffect = document.getElementById('pixelEffect');

  let animations = [];
  let outlineOn = false;
  let pixelOn = false;

  // Проверка наличия эффектов
  if (!outlineEffect || !pixelEffect) {
    console.warn('Эффекты не найдены в DOM');
  }

  // Отслеживание всех событий загрузки
  mv.addEventListener('load', () => {
    statusSpan.textContent = '✅ Загружено';
    statusSpan.style.color = 'lightgreen';
    
    animations = mv.availableAnimations || [];
    console.log('Доступные анимации:', animations);
    
    if (animations.length > 0) {
      playAnimation(0);
    } else {
      console.log('У модели нет анимаций');
    }
  });

  mv.addEventListener('error', (event) => {
    const error = event.detail;
    statusSpan.textContent = '❌ Ошибка';
    statusSpan.style.color = 'red';
    
    let errorMsg = 'Неизвестная ошибка';
    if (error && error.type) {
      errorMsg = `${error.type}: ${error.message || ''}`;
    }
    
    errorDiv.innerHTML = `Ошибка: ${errorMsg}`;
    console.error('Ошибка model-viewer:', error);
  });

  mv.addEventListener('progress', (event) => {
    const progress = Math.round(event.detail.totalProgress * 100);
    statusSpan.textContent = `Загрузка... ${progress}%`;
  });

  // Дополнительная проверка загрузки модели
  fetch('horse.glb', { method: 'HEAD' })
    .then(response => {
      if (response.ok) {
        console.log('✅ Файл модели доступен');
        document.getElementById('modelPath').style.color = 'lightgreen';
      } else {
        console.error('❌ Файл модели НЕ доступен:', response.status);
        document.getElementById('modelPath').style.color = 'red';
        errorDiv.innerHTML = `Файл не найден (${response.status})`;
      }
    })
    .catch(err => {
      console.error('❌ Ошибка при проверке файла:', err);
      document.getElementById('modelPath').style.color = 'red';
      errorDiv.innerHTML = `Ошибка доступа к файлу: ${err.message}`;
    });

  function playAnimation(index) {
    if (!animations[index]) {
      console.warn(`Анимация ${index} не существует`);
      return;
    }

    mv.animationName = animations[index];
    mv.currentTime = 0;
    mv.play();
    console.log('▶️ Играет:', animations[index]);
  }

  btn1.onclick = () => playAnimation(0);
  btn2.onclick = () => playAnimation(1);

  outlineBtn.onclick = () => {
    if (outlineEffect) {
      outlineOn = !outlineOn;
      outlineEffect.setAttribute('blend-mode', outlineOn ? 'default' : 'skip');
      outlineBtn.classList.toggle('active');
    }
  };

  pixelBtn.onclick = () => {
    if (pixelEffect) {
      pixelOn = !pixelOn;
      pixelEffect.setAttribute('blend-mode', pixelOn ? 'default' : 'skip');
      pixelBtn.classList.toggle('active');
    }
  };

})();
</script>

</body>
</html>
