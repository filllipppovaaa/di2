<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <title>Horse 3D - AR</title>

  <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.1/dist/es-module-shims.js"></script>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer-module.min.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer-effects/dist/model-viewer-effects.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f5f7;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px;
      border-radius: 30px;
      display: flex;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.9);
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    button:hover {
      transform: scale(1.05);
    }

    button.active {
      background: orange;
      color: white;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      --poster-color: transparent;
    }

    /* AR кнопка */
    #ar-button {
      background-image: url(https://modelviewer.dev/shared-assets/icons/ar.png);
      background-repeat: no-repeat;
      background-size: 20px 20px;
      background-position: 12px 50%;
      background-color: #fff;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 100px;
      padding: 12px 24px 12px 40px;
      border: 1px solid #ddd;
      border-radius: 40px;
      font-size: 16px;
      color: #333;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 20;
    }

    #ar-button:hover {
      background-color: #f0f0f0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      transform: translateX(-50%) scale(1.02);
    }

    /* AR подсказка */
    #ar-prompt {
      position: absolute;
      left: 50%;
      bottom: 180px;
      transform: translateX(-50%);
      animation: pulse 2s infinite;
      z-index: 15;
    }

    #ar-prompt img {
      width: 40px;
      height: 40px;
      opacity: 0.8;
    }

    @keyframes pulse {
      0% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
      100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    }

    /* Прогресс-бар загрузки */
    .progress-bar {
      position: absolute;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 4px;
      background: rgba(0,0,0,0.1);
      border-radius: 4px;
      overflow: hidden;
      z-index: 25;
    }

    .progress-bar.hide {
      display: none;
    }

    .update-bar {
      width: 0%;
      height: 100%;
      background: orange;
      transition: width 0.3s ease;
    }

    /* Адаптивность для мобильных */
    @media (max-width: 768px) {
      #controls {
        bottom: 80px;
        padding: 8px;
        gap: 5px;
      }
      
      button {
        padding: 8px 12px;
        font-size: 12px;
      }
      
      #ar-button {
        bottom: 160px;
        font-size: 14px;
        padding: 10px 20px 10px 36px;
      }
    }
  </style>
</head>

<body>

<div id="controls">
  <button id="btn1">🎬 Анимация 1</button>
  <button id="btn2">🚶 Анимация 2</button>
  <button id="outlineBtn">✨ Контур</button>
  <button id="pixelBtn">🔳 Пиксели</button>
</div>

<model-viewer
  id="mv"
  src="horse.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  tone-mapping="neutral"
  shadow-intensity="1"
  autoplay
  loading="eager"
  reveal="auto"
>

  <!-- Прогресс-бар загрузки -->
  <div class="progress-bar hide" slot="progress-bar">
    <div class="update-bar"></div>
  </div>

  <!-- AR кнопка -->
  <button slot="ar-button" id="ar-button">
    View in your space
  </button>

  <!-- AR подсказка -->
  <div id="ar-prompt" slot="ar-prompt">
    <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
  </div>

  <!-- Эффекты -->
  <effect-composer>
    <outline-effect id="outlineEffect" color="red" blend-mode="skip"></outline-effect>
    <pixelate-effect id="pixelEffect" granularity="15" blend-mode="skip"></pixelate-effect>
  </effect-composer>

</model-viewer>

<script>
(() => {
  const mv = document.getElementById('mv');
  const btn1 = document.getElementById('btn1');
  const btn2 = document.getElementById('btn2');
  const outlineBtn = document.getElementById('outlineBtn');
  const pixelBtn = document.getElementById('pixelBtn');

  const outlineEffect = document.getElementById('outlineEffect');
  const pixelEffect = document.getElementById('pixelEffect');

  const progressBar = document.querySelector('.progress-bar');
  const updateBar = document.querySelector('.update-bar');

  let animations = [];
  let currentIndex = 0;
  let outlineOn = false;
  let pixelOn = false;

  // Отслеживание прогресса загрузки
  mv.addEventListener('progress', (event) => {
    progressBar.classList.remove('hide');
    const progress = event.detail.totalProgress * 100;
    updateBar.style.width = `${progress}%`;
    
    if (progress >= 100) {
      setTimeout(() => {
        progressBar.classList.add('hide');
      }, 500);
    }
  });

  // Загрузка модели
  mv.addEventListener('load', () => {
    console.log('✅ Модель успешно загружена');
    animations = mv.availableAnimations || [];
    console.log('Анимации:', animations);

    if (animations.length > 0) {
      playAnimation(0);
    } else {
      console.warn('⚠️ У модели нет анимаций');
    }
  });

  // Обработка ошибок
  mv.addEventListener('error', (error) => {
    console.error('❌ Ошибка загрузки модели:', error);
    console.error('Детали:', error.detail);
    
    const errorMsg = document.createElement('div');
    errorMsg.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:red; color:white; padding:10px; border-radius:5px; z-index:1000;';
    errorMsg.textContent = 'Ошибка загрузки модели. Проверьте консоль (F12) для деталей.';
    document.body.appendChild(errorMsg);
  });

  function playAnimation(index) {
    if (!animations[index]) return;

    currentIndex = index;
    mv.animationName = animations[index];
    mv.currentTime = 0;
    mv.play();

    console.log('▶️ Играет:', animations[index]);
  }

  // КНОПКИ АНИМАЦИЙ
  btn1.onclick = () => playAnimation(0);
  btn2.onclick = () => playAnimation(1);

  // КОНТУР
  outlineBtn.onclick = () => {
    outlineOn = !outlineOn;
    outlineEffect.setAttribute('blend-mode', outlineOn ? 'default' : 'skip');
    outlineBtn.classList.toggle('active');
  };

  // ПИКСЕЛИ
  pixelBtn.onclick = () => {
    pixelOn = !pixelOn;
    pixelEffect.setAttribute('blend-mode', pixelOn ? 'default' : 'skip');
    pixelBtn.classList.toggle('active');
  };

  // Обработка AR-режима
  mv.addEventListener('ar-status', (event) => {
    console.log('AR статус:', event.detail.status);
  });

  mv.addEventListener('environment-change', (event) => {
    console.log('Окружение изменено:', event.detail);
  });

})();
</script>

<!-- Добавим poster изображение, если оно есть -->
<!-- Если poster.webp не существует, можно создать его или закомментировать -->
<!-- <img src="poster.webp" style="display:none;" alt=""> -->

</body>
</html>
